spring.application.name=student-management-system

# =================== Database Configuration ===================
# Using H2 file-based database for persistent storage
spring.datasource.url=jdbc:h2:file:./data/smsdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =================== Server Configuration ===================
server.port=8080
server.servlet.context-path=/
server.error.include-message=always

# =================== Student ID Generation Configuration ===================
# Student ID Format: KDU-SE-YYYY-XXXX
student.id.prefix=KDU
student.id.program=SE
student.id.format=KDU-SE-{year}-{sequence}

# =================== Logging Configuration ===================
logging.level.root=INFO
logging.level.com.sms.student_management_system=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =================== Thymeleaf Configuration ===================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# =================== Application Custom Properties ===================
app.name=Student Management System
app.version=1.0.0
app.organization=KDU

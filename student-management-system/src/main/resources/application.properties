spring.application.name=student-management-system

# =================== Database Configuration ===================
# Using PostgreSQL database for persistent storage
spring.datasource.url=jdbc:postgresql://localhost:5432/smsdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# =================== Server Configuration ===================
server.port=8080
server.servlet.context-path=/
server.error.include-message=always

# =================== Student ID Generation ===================
# Format: KDU-{programCode}-YYYY-XXXX (e.g., KDU-BSE-2026-0001)
# Program codes are resolved automatically from the selected degree program

# =================== Logging Configuration ===================
logging.level.root=INFO
logging.level.com.sms.student_management_system=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =================== Thymeleaf Configuration ===================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# =================== Application Custom Properties ===================
app.name=Student Management System
app.version=1.0.0
app.organization=KDU




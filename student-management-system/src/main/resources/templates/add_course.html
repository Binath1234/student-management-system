<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h3 class="fw-bold mb-4 text-primary">Add New Course</h3>
                        <form th:action="@{/courses}" th:object="${course}" method="POST">
                            <div class="mb-3">
                                <label class="form-label small text-muted">Course Code</label>
                                <input type="text" th:field="*{courseCode}" class="form-control" placeholder="e.g. CS101" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">Course Name</label>
                                <input type="text" th:field="*{courseName}" class="form-control" placeholder="e.g. Database Systems" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label small text-muted">Credits</label>
                                    <input type="number" th:field="*{credits}" class="form-control" required>
                                </div>
                                <div class="col">
                                    <label class="form-label small text-muted">Status</label>
                                    <select th:field="*{status}" class="form-select">
                                        <option value="Active">Active</option>
                                        <option value="Full">Full</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">Instructor</label>
                                <input type="text" th:field="*{instructor}" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small text-muted">Department</label>
                                <input type="text" th:field="*{department}" class="form-control" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-4 w-100">Save Course</button>
                                <a th:href="@{/courses}" class="btn btn-outline-secondary px-4 w-100">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome - SMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1523050853064-8521a30302b5?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold">ශිෂ්‍ය කළමනාකරණ පද්ධතිය</h1>
            <p class="lead mb-5">අපේ විද්‍යාලයේ ශිෂ්‍ය දත්ත ඉතා පහසුවෙන් පාලනය කරන්න.</p>
            <div class="gap-3 d-md-flex justify-content-center">
                <a th:href="@{/register}" class="btn btn-primary btn-lg px-5">ලියාපදිංචි වන්න</a>
                <a th:href="@{/students}" class="btn btn-outline-light btn-lg px-5">ශිෂ්‍ය ලැයිස්තුව</a>
            </div>
        </div>
    </div>
    <div class="gap-3 d-md-flex justify-content-center">
    <a th:href="@{/login}" class="btn btn-warning btn-lg px-5">Admin Login</a>
    
</div>
</body>
</html>

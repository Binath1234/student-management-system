<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course - SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px 0; position: fixed; width: 250px; left: 0; top: 0; z-index: 1000;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }
        .sidebar .logo { color: white; padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 20px; }
        .sidebar .logo h4 { font-weight: 700; letter-spacing: 0.5px; margin: 0; }
        .sidebar .nav-link { color: rgba(255, 255, 255, 0.8); padding: 12px 20px; margin: 5px 10px; border-radius: 8px; transition: all 0.3s ease; text-decoration: none; display: flex; align-items: center; font-weight: 500; border-left: 4px solid transparent; }
        .sidebar .nav-link:hover { background-color: rgba(255, 255, 255, 0.15); color: white; transform: translateX(5px); }
        .sidebar .nav-link.active { background-color: rgba(255, 255, 255, 0.25); color: white; border-left-color: white; }
        .sidebar .nav-link i { margin-right: 12px; font-size: 18px; }
        .sidebar-logout { position: absolute; bottom: 20px; width: 100%; padding: 0 10px; }
        .sidebar-logout .nav-link { width: calc(100% - 20px); justify-content: center; margin: 0 10px; }

        .main-content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); min-height: 100vh; }
        .page-header { background: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
        .page-header h2 { color: #1e293b; font-weight: 700; margin: 0 0 5px 0; }
        .page-header p { color: #64748b; margin: 0; font-size: 14px; }
        .form-container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }

        .btn-purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; color: white; font-weight: 600; transition: all 0.3s ease;
        }
        .btn-purple:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4296 100%);
            color: white; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .section-divider { border-top: 2px solid #f1f5f9; margin: 25px 0; }

        .code-badge {
            display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; margin-bottom: 20px; }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .sidebar-logout { position: relative; bottom: auto; margin-top: 20px; }
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="logo">
            <i class="bi bi-graph-up" style="font-size: 28px; color: white;"></i>
            <h4>SMS</h4>
            <small style="color: rgba(255, 255, 255, 0.7);">Student Management</small>
        </div>
        <nav class="nav flex-column px-2">
            <a th:href="@{/}" class="nav-link"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
            <a th:href="@{/register}" class="nav-link"><i class="bi bi-person-plus"></i><span>Student Registration</span></a>
            <a th:href="@{/students}" class="nav-link"><i class="bi bi-people"></i><span>Student Management</span></a>
            <a th:href="@{/courses}" class="nav-link active"><i class="bi bi-book"></i><span>Course Management</span></a>
            <a th:href="@{/programs}" class="nav-link"><i class="bi bi-mortarboard"></i><span>Programs</span></a>
            <a th:href="@{/reports}" class="nav-link"><i class="bi bi-bar-chart-line"></i><span>Reports</span></a>
            <a th:href="@{/settings}" class="nav-link"><i class="bi bi-gear"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-logout">
            <a th:href="@{/logout}" class="nav-link" style="background-color: rgba(255, 255, 255, 0.2); border-radius: 8px; justify-content: center;">
                <i class="bi bi-box-arrow-right"></i><span>Logout</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-pencil-square me-2" style="color: #667eea;"></i>Edit Course Details</h2>
            <p>Update course information for <span class="fw-semibold" th:text="${course.courseCode}"></span></p>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="form-container">
                    <form th:action="@{/courses/update/{id}(id=${course.id})}" th:object="${course}" method="POST">

                        <!-- Course Code (read-only) -->
                        <h6 class="mb-3" style="color: #667eea; font-weight: 700;">
                            <i class="bi bi-journal-text me-2"></i>Course Details
                        </h6>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Course Code</label>
                            <div class="d-flex align-items-center gap-2">
                                <input type="text" th:field="*{courseCode}" class="form-control py-2" readonly style="background: #f8fafc;">
                                <span class="code-badge" th:text="${course.courseCode}"></span>
                            </div>
                            <small class="text-muted">Course code cannot be changed</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Course Name <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{courseName}" class="form-control py-2" placeholder="e.g. Database Management Systems" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Credits <span class="text-danger">*</span></label>
                                <input type="number" th:field="*{credits}" class="form-control py-2" min="1" max="6" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Status</label>
                                <select th:field="*{status}" class="form-select py-2">
                                    <option value="Active">Active</option>
                                    <option value="Full">Full</option>
                                    <option value="Inactive">Inactive</option>
                                    <option value="Cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Semester</label>
                                <select th:field="*{semester}" class="form-select py-2">
                                    <option value="">-- Select --</option>
                                    <option value="Semester 1">Semester 1</option>
                                    <option value="Semester 2">Semester 2</option>
                                    <option value="Semester 3">Semester 3</option>
                                    <option value="Semester 4">Semester 4</option>
                                    <option value="Semester 5">Semester 5</option>
                                    <option value="Semester 6">Semester 6</option>
                                    <option value="Semester 7">Semester 7</option>
                                    <option value="Semester 8">Semester 8</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Instructor <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{instructor}" class="form-control py-2" placeholder="e.g. Dr. Amal Perera" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Department <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{department}" class="form-control py-2" placeholder="e.g. Computer Science" required>
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <h6 class="mb-3" style="color: #667eea; font-weight: 700;">
                            <i class="bi bi-clock me-2"></i>Schedule & Program
                        </h6>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Schedule</label>
                                <input type="text" th:field="*{schedule}" class="form-control py-2" placeholder="e.g. Monday 08:00-10:00">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Degree Program</label>
                                <input type="text" th:field="*{programName}" class="form-control py-2" placeholder="e.g. BSc (Hons) in Computer Science">
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-purple px-4 py-2 w-100">
                                <i class="bi bi-check-circle me-2"></i>Update Course
                            </button>
                            <a th:href="@{/courses}" class="btn btn-outline-secondary px-4 py-2 w-100">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

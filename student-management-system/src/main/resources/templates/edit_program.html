<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Program - SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }

        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px 0; position: fixed; width: 250px; left: 0; top: 0; z-index: 1000;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }
        .sidebar .logo { color: white; padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 20px; }
        .sidebar .logo h4 { font-weight: 700; letter-spacing: 0.5px; margin: 0; }
        .sidebar .nav-link { color: rgba(255, 255, 255, 0.8); padding: 12px 20px; margin: 5px 10px; border-radius: 8px; transition: all 0.3s ease; text-decoration: none; display: flex; align-items: center; font-weight: 500; border-left: 4px solid transparent; }
        .sidebar .nav-link:hover { background-color: rgba(255, 255, 255, 0.15); color: white; transform: translateX(5px); }
        .sidebar .nav-link.active { background-color: rgba(255, 255, 255, 0.25); color: white; border-left-color: white; }
        .sidebar .nav-link i { margin-right: 12px; font-size: 18px; }
        .sidebar-logout { position: absolute; bottom: 20px; width: 100%; padding: 0 10px; }
        .sidebar-logout .nav-link { width: calc(100% - 20px); justify-content: center; margin: 0 10px; }

        .main-content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); min-height: 100vh; }
        .page-header { background: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
        .page-header h2 { color: #1e293b; font-weight: 700; margin: 0 0 5px 0; }
        .page-header p { color: #64748b; margin: 0; font-size: 14px; }
        .form-container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; margin-bottom: 20px; }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .sidebar-logout { position: relative; bottom: auto; margin-top: 20px; }
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="logo">
            <i class="bi bi-graph-up" style="font-size: 28px; color: white;"></i>
            <h4>SMS</h4>
            <small style="color: rgba(255, 255, 255, 0.7);">Student Management</small>
        </div>
        <nav class="nav flex-column px-2">
            <a th:href="@{/}" class="nav-link"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>
            <a th:href="@{/register}" class="nav-link"><i class="bi bi-person-plus"></i><span>Student Registration</span></a>
            <a th:href="@{/students}" class="nav-link"><i class="bi bi-people"></i><span>Student Management</span></a>
            <a th:href="@{/courses}" class="nav-link"><i class="bi bi-book"></i><span>Course Management</span></a>
            <a th:href="@{/programs}" class="nav-link active"><i class="bi bi-mortarboard"></i><span>Programs</span></a>
            <a th:href="@{/reports}" class="nav-link"><i class="bi bi-bar-chart-line"></i><span>Reports</span></a>
            <a th:href="@{/settings}" class="nav-link"><i class="bi bi-gear"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-logout">
            <a th:href="@{/logout}" class="nav-link" style="background-color: rgba(255, 255, 255, 0.2); border-radius: 8px; justify-content: center;">
                <i class="bi bi-box-arrow-right"></i><span>Logout</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h2>Edit Academic Program</h2>
            <p>Update program details and configuration</p>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="form-container">
                    <form th:action="@{/programs/update/{id}(id=${program.id})}" th:object="${program}" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Program Code</label>
                                <input type="text" th:field="*{programCode}" class="form-control py-2" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Program Name</label>
                                <input type="text" th:field="*{programName}" class="form-control py-2" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Degree Type</label>
                                <select th:field="*{degreeType}" class="form-select py-2">
                                    <option value="Bachelor">Bachelor</option>
                                    <option value="Master">Master</option>
                                    <option value="Diploma">Diploma</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Department</label>
                                <input type="text" th:field="*{department}" class="form-control py-2">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Duration</label>
                                <input type="text" th:field="*{duration}" class="form-control py-2">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Credits</label>
                                <input type="number" th:field="*{credits}" class="form-control py-2">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Enrolled Students</label>
                                <input type="number" th:field="*{enrolled}" class="form-control py-2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Coordinator</label>
                                <input type="text" th:field="*{coordinator}" class="form-control py-2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Status</label>
                                <select th:field="*{status}" class="form-select py-2">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-top d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 py-2 w-100">
                                <i class="bi bi-check-circle me-2"></i>Save Changes
                            </button>
                            <a th:href="@{/programs}" class="btn btn-outline-secondary px-4 py-2 w-100">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            width: 250px;
            left: 0;
            top: 0;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar .logo {
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .sidebar .logo h4 {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }

        .sidebar .nav-link.active {
            background-color: rgba(255, 255, 255, 0.25);
            color: white;
            border-left-color: white;
        }

        .sidebar .nav-link i {
            margin-right: 12px;
            font-size: 18px;
        }

        .sidebar-logout {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 10px;
        }

        .sidebar-logout .nav-link {
            width: calc(100% - 20px);
            justify-content: center;
            margin: 0 10px;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            min-height: 100vh;
        }

        .page-header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .page-header h2 {
            color: #1e293b;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .page-header p {
            color: #64748b;
            margin: 0;
            font-size: 14px;
        }

        /* Content Container */
        .content-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* Search Bar */
        .search-icon {
            background: transparent;
            border-right: none;
        }

        .search-input {
            border-left: none;
        }

        .search-input:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        /* Avatar */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .status-badge {
            background-color: #d1fae5;
            color: #065f46;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-badge.inactive {
            background-color: #fee2e2;
            color: #991b1b;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                margin-bottom: 20px;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 15px;
            }

            .content-section {
                padding: 15px;
            }

            .sidebar-logout {
                position: relative;
                bottom: auto;
                margin-top: 20px;
                width: calc(100% - 20px);
            }
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover, .btn-primary:focus, .btn-primary:active {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4296 100%);
            border: none;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>

<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <i class="bi bi-graph-up" style="font-size: 28px; color: white;"></i>
            <h4>SMS</h4>
            <small style="color: rgba(255, 255, 255, 0.7);">Student Management</small>
        </div>

        <nav class="nav flex-column px-2">
            <a th:href="@{/}" class="nav-link">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/register}" class="nav-link">
                <i class="bi bi-person-plus"></i>
                <span>Student Registration</span>
            </a>
            <a th:href="@{/students}" class="nav-link active">
                <i class="bi bi-people"></i>
                <span>Student Management</span>
            </a>
            <a th:href="@{/courses}" class="nav-link">
                <i class="bi bi-book"></i>
                <span>Course Management</span>
            </a>
            <a th:href="@{/programs}" class="nav-link">
                <i class="bi bi-mortarboard"></i>
                <span>Programs</span>
            </a>
            <a th:href="@{/reports}" class="nav-link">
                <i class="bi bi-bar-chart-line"></i>
                <span>Reports</span>
            </a>
            <a th:href="@{/settings}" class="nav-link">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-logout">
            <a th:href="@{/logout}" class="nav-link" style="background-color: rgba(255, 255, 255, 0.2); border-radius: 8px; justify-content: center;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="page-header">
            <h2>Student Management Dashboard</h2>
            <p>View and manage student records</p>
        </div>

        <!-- Search Section -->
        <div class="mb-4">
            <form th:action="@{/students}" method="get">
                <label class="form-label text-muted fw-600">Search by Unique Student ID</label>
                <div class="input-group" style="max-width: 600px;">
                    <span class="input-group-text search-icon"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" name="keyword" class="form-control search-input" placeholder="[ Enter student ID number...]">
                    <button type="submit" class="btn btn-primary px-4">Search</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="content-section">
            <table class="table table-hover align-middle mb-0">
                <thead class="text-muted" style="border-bottom: 2px solid #f8fafc;">
                    <tr>
                        <th class="border-0 pb-3">Avatar</th>
                        <th class="border-0 pb-3">Full Name</th>
                        <th class="border-0 pb-3">Student Number</th>
                        <th class="border-0 pb-3">Degree Program</th>
                        <th class="border-0 pb-3">Status</th>
                        <th class="border-0 pb-3 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td>
                            <img th:src="@{'https://ui-avatars.com/api/?name=' + ${student.fullName} + '&background=random&color=fff'}" class="avatar" alt="avatar">
                        </td>
                        <td>
                            <span class="fw-semibold" th:text="${student.fullName}"></span>
                        </td>
                        <td th:text="${student.studentNumber}"></td>
                        <td th:text="${student.program}"></td>
                        <td>
                            <span class="status-badge" th:if="${student.active}">Active</span>
                            <span class="status-badge inactive" th:unless="${student.active}">Inactive</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-sm text-primary fs-6 py-0 px-2" title="Edit course history">
                                <i class="bi bi-book"></i> Course History
                            </a>
                            <a th:href="@{/students/delete/{id}(id=${student.id})}" 
                               class="btn btn-sm text-danger fs-6 py-0 px-2"
                               onclick="return confirm('Are you sure you want to remove this student?')"
                               title="Remove student">
                                <i class="bi bi-trash"></i> Remove
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

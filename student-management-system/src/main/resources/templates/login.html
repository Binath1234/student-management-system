<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - KDU Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        /* Floating animated shapes */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            animation: floatShape 20s infinite ease-in-out;
        }

        .bg-shapes .shape:nth-child(1) {
            width: 300px; height: 300px;
            top: -80px; left: -80px;
            animation-duration: 18s;
        }

        .bg-shapes .shape:nth-child(2) {
            width: 200px; height: 200px;
            bottom: -60px; right: -60px;
            animation-duration: 22s;
            animation-delay: 2s;
        }

        .bg-shapes .shape:nth-child(3) {
            width: 150px; height: 150px;
            top: 50%; left: 70%;
            animation-duration: 25s;
            animation-delay: 4s;
        }

        .bg-shapes .shape:nth-child(4) {
            width: 100px; height: 100px;
            top: 20%; right: 20%;
            animation-duration: 15s;
            animation-delay: 1s;
        }

        .bg-shapes .shape:nth-child(5) {
            width: 250px; height: 250px;
            bottom: 10%; left: 30%;
            animation-duration: 20s;
            animation-delay: 3s;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(30px, -40px) rotate(90deg) scale(1.05); }
            50% { transform: translate(-20px, 20px) rotate(180deg) scale(0.95); }
            75% { transform: translate(40px, 30px) rotate(270deg) scale(1.02); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.35);
        }

        .login-icon i {
            font-size: 40px;
            color: white;
        }

        .university-name {
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 4px;
            line-height: 1.4;
            letter-spacing: 0.3px;
        }

        .university-divider {
            width: 50px;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            margin: 12px auto;
        }

        .login-title {
            text-align: center;
            font-weight: 700;
            font-size: 22px;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .login-subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            transition: color 0.3s;
        }

        .form-control {
            padding: 13px 16px 13px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
            outline: none;
        }

        .form-control:focus + i,
        .input-wrapper:focus-within i {
            color: #667eea;
        }

        .form-control::placeholder {
            color: #cbd5e1;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 24px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
                border-radius: 16px;
            }

            .login-icon {
                width: 65px;
                height: 65px;
            }

            .login-icon i {
                font-size: 28px;
            }

            .login-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Background Shapes -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- University Branding -->
            <div class="login-icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>

            <p class="university-name">General Sir John Kotelawala<br>Defence University</p>
            <div class="university-divider"></div>

            <h2 class="login-title">Student Management System</h2>
            <p class="login-subtitle">Sign in to access the admin portal</p>

            <!-- Error Message -->
            <div th:if="${error}" class="alert-error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${error}">Invalid credentials</span>
            </div>

            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                        <i class="bi bi-person"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter your password" required>
                        <i class="bi bi-lock"></i>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
        </div>

        <p class="footer-text">&copy; 2026 General Sir John Kotelawala Defence University</p>
    </div>

    <script>
        function togglePassword() {
            const field = document.getElementById('passwordField');
            const icon = document.getElementById('toggleIcon');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>

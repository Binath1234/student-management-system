<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | SMS'">SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
            position: fixed;
            width: 250px;
            left: 0;
            top: 0;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar .logo {
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .sidebar .logo h4 {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            margin: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }

        .sidebar .nav-link.active {
            background-color: rgba(255, 255, 255, 0.25);
            color: white;
            border-left-color: white;
        }

        .sidebar .nav-link i {
            margin-right: 12px;
            font-size: 18px;
        }

        .sidebar-logout {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 10px;
        }

        .sidebar-logout .nav-link {
            width: calc(100% - 20px);
            justify-content: center;
            margin: 0 10px;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            width: calc(100% - 250px);
            min-height: 100vh;
        }

        .page-header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            color: #1e293b;
            font-weight: 700;
            margin: 0;
        }

        .page-header p {
            color: #64748b;
            margin: 5px 0 0 0;
            font-size: 14px;
        }

        .page-header-title {
            flex: 1;
        }

        .page-header-action {
            display: flex;
            gap: 10px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
            color: white;
        }

        /* Content Container */
        .content-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 25px;
            font-size: 18px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                margin-bottom: 20px;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 15px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-header-action {
                margin-top: 15px;
                width: 100%;
            }

            .content-section {
                padding: 15px;
            }

            .sidebar-logout {
                position: relative;
                bottom: auto;
                margin-top: 20px;
                width: calc(100% - 20px);
            }
        }
    </style>

    <th:block layout:fragment="extra-css"></th:block>
</head>
<body>

    <!-- SIDEBAR NAVIGATION -->
    <div class="sidebar">
        <div class="logo">
            <i class="bi bi-graph-up" style="font-size: 28px; color: white;"></i>
            <h4>SMS</h4>
            <small style="color: rgba(255, 255, 255, 0.7);">Student Management</small>
        </div>

        <nav class="nav flex-column px-2">
            <a th:href="@{/}" class="nav-link" th:classappend="${#request.requestURI == '/' ? 'active' : ''}">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/students}" class="nav-link" th:classappend="${#request.requestURI.contains('students') ? 'active' : ''}">
                <i class="bi bi-person-plus"></i>
                <span>Student Registration</span>
            </a>
            <a href="#" class="nav-link" th:classappend="${#request.requestURI.contains('student') || #request.requestURI.contains('management') ? 'active' : ''}">
                <i class="bi bi-people"></i>
                <span>Student Management</span>
            </a>
            <a th:href="@{/courses}" class="nav-link" th:classappend="${#request.requestURI.contains('courses') ? 'active' : ''}">
                <i class="bi bi-book"></i>
                <span>Course Management</span>
            </a>
            <a th:href="@{/programs}" class="nav-link" th:classappend="${#request.requestURI.contains('programs') ? 'active' : ''}">
                <i class="bi bi-mortarboard"></i>
                <span>Programs</span>
            </a>
            <a th:href="@{/reports}" class="nav-link" th:classappend="${#request.requestURI.contains('reports') ? 'active' : ''}">
                <i class="bi bi-bar-chart-line"></i>
                <span>Reports</span>
            </a>
            <a th:href="@{/settings}" class="nav-link" th:classappend="${#request.requestURI.contains('settings') ? 'active' : ''}">
                <i class="bi bi-gear"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar-logout">
            <a th:href="@{/logout}" class="nav-link" style="background-color: rgba(255, 255, 255, 0.2); border-radius: 8px; justify-content: center;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-header-title">
                <h2 th:text="${pageTitle}">Page Title</h2>
                <p th:text="${pageSubtitle}">Page Subtitle</p>
            </div>
            <div class="page-header-action" th:if="${pageAction != null}">
                <th:block th:replace="${pageAction}"></th:block>
            </div>
        </div>

        <!-- Page Content -->
        <div layout:fragment="content">
            <!-- Content goes here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <th:block layout:fragment="extra-js"></th:block>
</body>
</html>
